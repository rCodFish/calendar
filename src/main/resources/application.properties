spring.application.name=meetings

server.port=8080

spring.datasource.url=jdbc:h2:file:./data/meetingsdb;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

#for testing purposes
spring.jpa.hibernate.ddl-auto=create-drop
#spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.thymeleaf.cache=false

# Public base URL used to construct subscribable iCal links.
# The tests use random ports
app.base-url=http://localhost:8080

# Left as is because tests mock the servers to not block the ip
# Discovery providers — leave blank to disable a provider. Get keys from:
#   Ticketmaster: https://developer.ticketmaster.com/
#   SeatGeek:     https://platform.seatgeek.com/
app.discover.ticketmaster.api-key=${TICKETMASTER_API_KEY:}
# Two-letter ISO country code passed to Ticketmaster as countryCode. Blank = global.
app.discover.ticketmaster.country-code=${TICKETMASTER_COUNTRY:PT}
app.discover.seatgeek.client-id=${SEATGEEK_CLIENT_ID:}
