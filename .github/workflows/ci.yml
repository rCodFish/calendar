name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Run Tests
        run: |
          mvn -B clean test \
            --no-transfer-progress \
            -Dmaven.test.skip=false \
            -Dsurefire.useFile=false \
            -DfailIfNoTests=false

      - name: Debug - List Reports
        if: always()
        run: |
          echo "=== Looking for test reports ==="
          find . -name "*.xml" | grep -E "(surefire|failsafe)" || echo "No XML reports found"
          echo "=== Surefire text summaries ==="
          find target/surefire-reports -name "*.txt" -exec cat {} \; 2>/dev/null || echo "No .txt files"

      - name: Publish Test Results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: JUnit Test Results
          path: '**/target/surefire-reports/TEST-*.xml'
          reporter: java-junit
          fail-on-error: false
