name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Run Tests
        id: mvn-tests
        run: mvn -B clean test --no-transfer-progress
        continue-on-error: true

      - name: Publish Test Results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: JUnit Test Results
          path: '**/target/surefire-reports/TEST-*.xml'
          reporter: java-junit
          fail-on-error: false
          only-summary: true
          list-suites: failed
          list-tests: failed

      - name: Test Summary
        if: always()
        run: |
          echo "=================================================================="
          echo "TEST SUMMARY"
          echo "=================================================================="
          
          # Count results from Surefire
          PASSED=$(grep -oP 'Tests run: \d+, Failures: \d+, Errors: \d+, Skipped: \d+' target/surefire-reports/*.txt | tail -1 | grep -oP '\d+' | head -1 || echo "0")
          FAILED=$(grep -oP 'Tests run: \d+, Failures: \d+, Errors: \d+, Skipped: \d+' target/surefire-reports/*.txt | tail -1 | grep -oP '\d+' | sed -n '2p' || echo "0")
          
          echo "Total Tests: $((PASSED + FAILED))"
          echo "✅ Passed : $PASSED"
          echo "❌ Failed : $FAILED"
          
          if [ "$FAILED" -gt 0 ]; then
            echo ""
            echo "❌ Failing test(s):"
            grep -B5 -A10 "Expecting value to be true but was false" target/surefire-reports/*.txt || true
            echo ""
            echo " Check the 'JUnit Test Results' section above for full details."
          else
            echo "✅ All tests passed!"
          fi
          
          echo "=================================================================="
